name: omo-switch
options:
  bundleIdPrefix: com.omOSwitch
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  projectFormat: xcode15_0
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual

targets:
  OMOSwitch:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: OMOSwitch
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_NAME: omo-switch
        INFOPLIST_FILE: OMOSwitch/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_ENTITLEMENTS: ""
    info:
      path: OMOSwitch/Info.plist
      properties:
        CFBundleName: omo-switch
        CFBundleDisplayName: omo-switch
        CFBundleIdentifier: com.omOSwitch.omo-switch
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: omo-switch
        LSMinimumSystemVersion: "13.0"
        LSUIElement: true
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication

  OMOSwitchTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: OMOSwitchTests
        excludes:
          - "**/*.md"
    dependencies:
      - target: OMOSwitch
    settings:
      base:
        PRODUCT_NAME: OMOSwitchTests
        INFOPLIST_FILE: OMOSwitchTests/Info.plist
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/omo-switch.app/Contents/MacOS/omo-switch"
        BUNDLE_LOADER: "$(TEST_HOST)"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
    info:
      path: OMOSwitchTests/Info.plist
      properties:
        CFBundleName: OMOSwitchTests
        CFBundleIdentifier: com.omOSwitch.omo-switch.tests
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: BNDL
        CFBundleExecutable: OMOSwitchTests
